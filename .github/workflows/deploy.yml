name: Build and Deploy to AWS ECS

on:
  push:
    branches: [master]

env:
  AWS_REGION: us-west-2
  APP_NAME: customer-order-portal

jobs:
  build-and-deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 3: Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Build and push Docker image
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$APP_NAME:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$APP_NAME:latest .
          docker push $ECR_REGISTRY/$APP_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$APP_NAME:latest
          echo "image=$ECR_REGISTRY/$APP_NAME:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Step 5: Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # Step 6: Terraform Init
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      # Step 7: Terraform Apply - provision/update infrastructure
      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      # Step 8: Force new ECS deployment
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster $APP_NAME-cluster \
            --service $APP_NAME-service \
            --force-new-deployment \
            --region $AWS_REGION
